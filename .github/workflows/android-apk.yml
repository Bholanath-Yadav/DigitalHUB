name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --dir artifacts/gaming-store build

      - name: Sync Capacitor Android project
        run: pnpm --dir artifacts/android-app exec cap sync android

      - name: Build debug APK
        working-directory: artifacts/android-app/android
        run: ./gradlew assembleDebug

      - name: Prepare release APK
        run: cp artifacts/android-app/android/app/build/outputs/apk/debug/app-debug.apk artifacts/android-app/android/app/build/outputs/apk/debug/DigitalHUB.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: digital-hub-debug-apk
          path: artifacts/android-app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Digital HUB APK ${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/android-app/android/app/build/outputs/apk/debug/DigitalHUB.apk