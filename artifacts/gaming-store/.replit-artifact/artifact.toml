kind = "web"
previewPath = "/"
title = "Gaming Store"
version = "1.0.0"
id = "artifacts/gaming-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22457

[services.development]
run = "pnpm --filter @workspace/gaming-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gaming-store", "run", "build" ]
publicDir = "artifacts/gaming-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22457"
BASE_PATH = "/"
